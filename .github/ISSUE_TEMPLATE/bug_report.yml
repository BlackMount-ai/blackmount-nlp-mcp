name: Bug Report
description: Report a bug in blackmount-nlp-mcp
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: "get_sentiment_score returned positive for clearly negative text..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install blackmount-nlp-mcp
        2. Call sentiment_score("...")
        3. Got X, expected Y
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.3"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
